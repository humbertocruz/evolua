<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolua Preview</title>
    <style>
      :root {
        --bg: #09090b; --surface: #18181b; --surface-2: #111114; --border: #27272a;
        --text: #fafafa; --muted: #a1a1aa; --accent: #ec4899; --accent-2: #8b5cf6;
        --highlight: rgba(236,72,153,.16);
      }
      * { box-sizing: border-box; }
      body { font-family: Inter, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
      .app { display: grid; grid-template-columns: 280px 1fr 420px; min-height: 100vh; }
      .sidebar, .inspector { background: var(--surface-2); border-right: 1px solid var(--border); }
      .inspector { border-right: 0; border-left: 1px solid var(--border); }
      .sidebar, .main, .inspector { padding: 20px; overflow: auto; }
      h1, h2, h3, h4 { margin-top: 0; }
      .subtle { color: var(--muted); }
      .node-list, .related-list, .focus-list, .spatial-legend { display: flex; flex-direction: column; gap: 8px; }
      .node-item, .related-item, .focus-item, .action-btn {
        width: 100%; text-align: left; background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer;
      }
      .node-item:hover, .node-item.active, .related-item:hover, .focus-item:hover, .action-btn:hover { border-color: var(--accent); background: #22121d; }
      .node-item.related, .focus-item.related { box-shadow: inset 0 0 0 1px rgba(236,72,153,.35); }
      .node-kind { font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; }
      .tabs, .subtabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
      .tab, .subtab { border: 1px solid var(--border); background: var(--surface); color: var(--text); padding: 10px 14px; border-radius: 999px; cursor: pointer; }
      .tab.active, .subtab.active { border-color: var(--accent-2); color: white; }
      .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
      pre, textarea, input {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      pre { white-space: pre-wrap; word-break: break-word; color: #d4d4d8; margin: 0; }
      input, textarea {
        width: 100%; background: #0f0f12; color: var(--text); border: 1px solid var(--border);
        border-radius: 10px; padding: 10px 12px;
      }
      textarea { min-height: 120px; resize: vertical; }
      .stack { display: flex; flex-direction: column; gap: 16px; }
      .grid-2 { display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; }
      .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #27272a; color: var(--muted); margin: 4px 6px 0 0; font-size: 12px; }
      .kv { display: grid; grid-template-columns: 120px 1fr; gap: 10px; font-size: 14px; }
      .kv div:nth-child(odd) { color: var(--muted); }
      .file-link { display: block; width: 100%; text-align: left; margin-top: 8px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; }
      .file-link.active { border-color: var(--accent); }
      .visual-tree { display: flex; flex-direction: column; gap: 12px; }
      .visual-node { border: 1px solid var(--border); border-radius: 14px; padding: 14px; background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); }
      .visual-node.page { background: linear-gradient(180deg, rgba(139,92,246,.12), rgba(255,255,255,.01)); }
      .visual-node.section { background: linear-gradient(180deg, rgba(236,72,153,.08), rgba(255,255,255,.01)); }
      .visual-node.component { background: linear-gradient(180deg, rgba(59,130,246,.08), rgba(255,255,255,.01)); }
      .visual-node.text { background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)); }
      .visual-node.selected { border-color: var(--accent); background: var(--highlight); }
      .visual-node.related { border-color: rgba(236,72,153,.45); }
      .visual-children { margin-top: 12px; padding-left: 16px; display: flex; flex-direction: column; gap: 10px; border-left: 1px dashed rgba(255,255,255,.08); }
      .projection-line { padding: 4px 8px; border-radius: 8px; }
      .projection-line.selected { background: var(--highlight); color: #fff; }
      .projection-line.related { background: rgba(139,92,246,.12); }
      .empty { color: var(--muted); font-style: italic; }
      .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
      .pill { padding: 8px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
      .pill.on { color: white; border-color: var(--accent); background: rgba(236,72,153,.08); }
      .preview-box { min-height: 220px; border: 1px dashed rgba(255,255,255,.12); border-radius: 18px; padding: 18px; background: linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,.005)); }
      .hero-box { padding: 18px; border-radius: 16px; background: linear-gradient(135deg, rgba(236,72,153,.16), rgba(139,92,246,.12)); border: 1px solid rgba(255,255,255,.08); }
      .movie-list-box { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; margin-top: 16px; }
      .movie-card { border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 14px; background: rgba(255,255,255,.02); }
      .movie-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(236,72,153,.35) inset; }
      .spatial-wrap { display: grid; grid-template-columns: 1fr 240px; gap: 16px; }
      .spatial-canvas { width: 100%; height: 520px; display: block; border-radius: 18px; border: 1px solid var(--border); background: radial-gradient(circle at top, rgba(139,92,246,.08), rgba(0,0,0,.1)); }
      .legend-item { display: flex; align-items: center; gap: 10px; color: var(--muted); }
      .legend-dot { width: 12px; height: 12px; border-radius: 999px; }
      .row { display: flex; gap: 10px; }
      .status { font-size: 13px; color: var(--muted); }
      @media (max-width: 1100px) { .app, .grid-2, .spatial-wrap { grid-template-columns: 1fr; } .sidebar, .inspector { border: 0; border-bottom: 1px solid var(--border); } }
    </style>

          node.relatedNodeIds = Array.from(refs);
        }

        function createVisualTree(nodeId) {
          const node = nodesById[nodeId];
          if (!node) return null;
          if (!['page','layout','section','component','slot','text'].includes(node.kind)) return null;
          return {
            id: node.id,
            name: node.name,
            kind: node.kind,
            props: node.props ?? {},
            styleTokens: node.styleTokens ?? [],
            children: (node.children ?? []).map(createVisualTree).filter(Boolean),
          };
        }

        payload.visualTree = (payload.app.rootPageIds ?? []).map(createVisualTree).filter(Boolean);

        function renderStructureNode(nodeId, depth = 1) {
          const node = nodesById[nodeId];
          if (!node) return [('  '.repeat(depth)) + '- [missing] ' + nodeId];
          const lines = [('  '.repeat(depth)) + '- ' + node.kind + ':' + node.name];
          for (const childId of node.children ?? []) lines.push(...renderStructureNode(childId, depth + 1));
          return lines;
        }

        payload.structure = ['app:' + payload.app.name, ...(payload.app.rootPageIds ?? []).flatMap((id) => renderStructureNode(id))].join('
');

        const dataNodes = payload.nodes.filter((node) => ['entity','field','state','query','binding'].includes(node.kind));
        const dataLines = ['data:' + payload.app.name];
        for (const node of dataNodes) {
          dataLines.push('  - ' + node.kind + ':' + node.name);
          if (node.source) dataLines.push('    source ' + node.source.kind + (node.source.reference ? ' -> ' + node.source.reference : ''));
          for (const relation of node.relationRefs ?? []) dataLines.push('    relation -> ' + relation.id);
          for (const field of node.schema?.fields ?? []) dataLines.push('    field ' + field.name + ': ' + field.type + (field.isList ? '[]' : '') + (field.required ? '!' : '?'));
          for (const binding of node.bindingRefs ?? []) dataLines.push('    binding ' + binding.from.id + ' -> ' + binding.to.id + (binding.expression ? ' (' + binding.expression + ')' : ''));
        }
        payload.data = dataLines.join('
');

        const behaviorNodes = payload.nodes.filter((node) => ['event','action','effect'].includes(node.kind));
        const behaviorLines = ['behavior:' + payload.app.name];
        for (const node of behaviorNodes) {
          behaviorLines.push('  - ' + node.kind + ':' + node.name);
          if (node.trigger) behaviorLines.push('    trigger ' + node.trigger.kind + ':' + node.trigger.name + (node.trigger.sourceRef ? ' from ' + node.trigger.sourceRef.id : ''));
          if (node.condition) behaviorLines.push('    condition ' + node.condition.expression);
          if (node.operation) behaviorLines.push('    operation ' + node.operation.kind + ':' + node.operation.name);
          for (const target of node.targetRefs ?? []) behaviorLines.push('    target -> ' + target.id);
          for (const effect of node.sideEffects ?? []) behaviorLines.push('    side-effect ' + effect.kind + ':' + effect.name);
        }
        payload.behavior = behaviorLines.join('
');

        const currentLabel = (id) => nodesById[id]?.name ?? id;
        for (const spatialNode of payload.spatial.nodes) {
          const sourceNode = nodesById[spatialNode.id];
          if (!sourceNode) continue;
          spatialNode.label = sourceNode.name;
          spatialNode.links = sourceNode.relatedNodeIds ?? [];
        }
        payload.spatial.edges = payload.spatial.nodes.flatMap((node) => (node.links ?? []).map((target) => ({
          id: 'edge:' + node.id + '->' + target,
          from: node.id,
          to: target,
          kind: 'relation',
          style: { color: '#52525b', opacity: 0.7 },
          meta: { fromLabel: currentLabel(node.id), toLabel: currentLabel(target) },
        })));

        const pageNode = payload.nodes.find((n) => n.id === 'view:page:dashboard');
        const heroNode = payload.nodes.find((n) => n.id === 'view:section:hero');
        payload.files = payload.files.map((file) => ({
          ...file,
          content: 'export default function ' + (pageNode?.name ?? 'Page') + '() {
' +
            '  return (
' +
            '    <main data-route="/movie/:id">
' +
            '      <h1>' + (pageNode?.name ?? 'Page') + '</h1>
' +
            '      <section data-node-id="view:section:hero">
' +
            '        <h2>' + (heroNode?.name ?? 'HeroSection') + '</h2>
' +
            '        <p>' + (heroNode?.props?.title ?? 'Untitled') + '</p>
' +
            '      </section>
' +
            '    </main>
' +
            '  );
' +
            '}
',
        }));
      }

      function updateAppMeta() {
        appMetaEl.textContent = payload.app.name + ' · ' + payload.app.version;
      }

      function selectNode(id) { state.selectedNodeId = id; renderNodeList(); renderTabContent(); renderInspector(); updateSpatialSelection(); }

      function renderNodeList() {
        nodeListEl.innerHTML = payload.nodes.map((node) => '<button class="node-item ' + (isSelected(node.id) ? 'active' : '') + ' ' + (isRelated(node.id) ? 'related' : '') + '" data-node-id="' + node.id + '"><div class="node-kind">' + node.kind + '</div><div>' + node.name + '</div><div class="subtle">' + node.id + '</div></button>').join('');
        nodeListEl.querySelectorAll('[data-node-id]').forEach((el) => el.addEventListener('click', () => selectNode(el.getAttribute('data-node-id'))));
      }

      function renderTabs() { tabEls.forEach((tab) => { tab.classList.toggle('active', tab.dataset.tab === state.activeTab); tab.onclick = () => { state.activeTab = tab.dataset.tab; renderTabs(); renderTabContent(); }; }); }

      function highlightProjection(content) {
        const selected = selectedNode(); if (!selected) return escapeUnsafe(content);
        const related = relatedIds();
        return escapeUnsafe(content).split('\n').map((line) => {
          let className = 'projection-line';
          if (line.includes(selected.id) || line.includes(selected.name)) className += ' selected';
          else for (const relatedId of related) { const relatedNode = nodeById(relatedId); if (line.includes(relatedId) || (relatedNode && line.includes(relatedNode.name))) { className += ' related'; break; } }
          return '<div class="' + className + '">' + line + '</div>';
        }).join('');
      }

      function renderProjectionPanel(title, content) { return '<section class="panel"><h3>' + title + '</h3><pre>' + highlightProjection(content) + '</pre></section>'; }

      function renderVisualNode(node) {
        if (!node) return '';
        const props = node.props && Object.keys(node.props).length ? '<div class="subtle">props: ' + escapeUnsafe(JSON.stringify(node.props)) + '</div>' : '';
        const styles = node.styleTokens?.length ? '<div class="subtle">styles: ' + escapeUnsafe(node.styleTokens.join(', ')) + '</div>' : '';
        const children = (node.children ?? []).map((child) => renderVisualNode(child)).join('');
        return '<div class="visual-node ' + node.kind + ' ' + (isSelected(node.id) ? 'selected' : '') + ' ' + (isRelated(node.id) ? 'related' : '') + '" data-node-id="' + node.id + '"><div class="node-kind">' + node.kind + '</div><div><strong>' + escapeUnsafe(node.name) + '</strong></div>' + props + styles + ((node.children ?? []).length ? '<div class="visual-children">' + children + '</div>' : '') + '</div>';
      }

      function renderMockPreview() {
        const selected = selectedNode();
        const heroNode = nodeById('view:section:hero');
        const titleNode = nodeById('view:text:hero-title');
        const listNode = nodeById('view:component:movie-list');
        const heroSelected = selected && ['view:section:hero','view:text:hero-title'].includes(selected.id);
        const movieListSelected = selected && selected.id === 'view:component:movie-list';
        return '<section class="panel"><h3>Rendered Surface (mock)</h3><div class="preview-box"><div class="hero-box ' + (heroSelected ? 'movie-card selected' : '') + '" data-node-id="view:section:hero"><div class="node-kind">section</div><h2 style="margin:6px 0 8px 0">' + escapeUnsafe(heroNode?.props?.title ?? 'Evolua Movies') + '</h2><p class="subtle" data-node-id="view:text:hero-title">' + escapeUnsafe(String(titleNode?.props?.content?.value ?? 'selectedGenre')) + ' → ' + escapeUnsafe(titleNode?.name ?? 'HeroTitle') + '</p></div><div class="movie-list-box ' + (movieListSelected ? 'movie-card selected' : '') + '" data-node-id="view:component:movie-list"><div class="movie-card"><strong>' + escapeUnsafe(listNode?.name ?? 'MovieList') + '</strong><div class="subtle">bound from query:movies</div></div><div class="movie-card"><strong>Movie Beta</strong><div class="subtle">bound from query:movies</div></div></div></div></section>';
      }

      function renderVisualPanel() {
        const visual = payload.visualTree?.map((node) => renderVisualNode(node)).join('') || '<div class="empty">No visual tree.</div>';
        tabContentEl.innerHTML = '<div class="grid-2"><section class="panel"><h3>Visual Projection</h3><div class="visual-tree">' + visual + '</div></section>' + renderMockPreview() + '</div>';
        tabContentEl.querySelectorAll('[data-node-id]').forEach((el) => el.addEventListener('click', (event) => { event.stopPropagation(); selectNode(el.getAttribute('data-node-id')); }));
      }

      function createGeometry(shape) {
        switch (shape) {
          case 'slab': return new THREE.BoxGeometry(3.0, 0.6, 2.2);
          case 'panel': return new THREE.BoxGeometry(2.4, 1.0, 1.2);
          case 'line': return new THREE.BoxGeometry(2.6, 0.2, 0.2);
          case 'sphere': return new THREE.SphereGeometry(1.0, 24, 24);
          case 'orb': return new THREE.SphereGeometry(0.7, 20, 20);
          case 'capsule': return new THREE.CapsuleGeometry(0.55, 1.5, 8, 16);
          case 'diamond': return new THREE.OctahedronGeometry(1.0);
          case 'prism': return new THREE.CylinderGeometry(0.8, 0.8, 1.8, 3);
          case 'ring': return new THREE.TorusGeometry(1.0, 0.22, 12, 32);
          default: return new THREE.BoxGeometry(1.8, 1.0, 1.8);
        }
      }

      function ensureSpatialRuntime() {
        const canvas = document.getElementById('spatial-canvas');
        if (!canvas || spatialRuntime?.canvas === canvas) return;
        if (spatialRuntime?.renderer) spatialRuntime.renderer.dispose();
        const spatial = payload.spatial;
        const scene = new THREE.Scene(); scene.background = new THREE.Color('#09090b');
        const camera = new THREE.PerspectiveCamera(55, canvas.clientWidth / canvas.clientHeight, 0.1, 1000); camera.position.set(spatial.camera.position.x, spatial.camera.position.y, spatial.camera.position.z);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true }); renderer.setPixelRatio(window.devicePixelRatio); renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
        const controls = new OrbitControls(camera, canvas); controls.enableDamping = true; controls.target.set(spatial.camera.target.x, spatial.camera.target.y, spatial.camera.target.z);
        scene.add(new THREE.AmbientLight('#ffffff', 0.9)); const point = new THREE.PointLight('#ec4899', 1.2, 200); point.position.set(20, 20, 20); scene.add(point); scene.add(new THREE.GridHelper(60, 20, '#27272a', '#16161a')); scene.add(new THREE.AxesHelper(8));
        const nodeMeshes = new Map(); const lineMaterial = new THREE.LineBasicMaterial({ color: 0x404050, transparent: true, opacity: 0.6 }); const raycaster = new THREE.Raycaster(); const pointer = new THREE.Vector2();
        spatial.nodes.forEach((node) => {
          const geometry = createGeometry(node.shape);
          const material = new THREE.MeshStandardMaterial({ color: node.style?.color ?? '#a1a1aa', emissive: node.style?.emissive ?? '#000000', emissiveIntensity: 0.12, roughness: 0.45, metalness: 0.2, transparent: true, opacity: node.style?.opacity ?? 1 });
          const mesh = new THREE.Mesh(geometry, material);
          mesh.position.set(node.position.x, node.position.y, node.position.z); mesh.rotation.set(node.rotation.x, node.rotation.y, node.rotation.z); mesh.scale.set(node.scale.x, node.scale.y, node.scale.z);
          mesh.userData = { nodeId: node.id, baseColor: node.style?.color ?? '#a1a1aa', baseScale: { ...node.scale } };
          scene.add(mesh); nodeMeshes.set(node.id, mesh);
        });
        spatial.edges.forEach((edge) => { const from = nodeMeshes.get(edge.from); const to = nodeMeshes.get(edge.to); if (!from || !to) return; const geometry = new THREE.BufferGeometry().setFromPoints([from.position, to.position]); scene.add(new THREE.Line(geometry, lineMaterial)); });
        function updateSize() { if (!canvas.clientWidth || !canvas.clientHeight) return; camera.aspect = canvas.clientWidth / canvas.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(canvas.clientWidth, canvas.clientHeight, false); }
        function onPointer(event) { const rect = canvas.getBoundingClientRect(); pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1; pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1; raycaster.setFromCamera(pointer, camera); const intersects = raycaster.intersectObjects(Array.from(nodeMeshes.values())); if (intersects[0]?.object?.userData?.nodeId) selectNode(intersects[0].object.userData.nodeId); }
        canvas.addEventListener('click', onPointer); window.addEventListener('resize', updateSize); spatialRuntime = { canvas, scene, camera, renderer, controls, nodeMeshes, updateSize }; updateSpatialSelection();
        function animate() { if (!spatialRuntime || spatialRuntime.canvas !== canvas) return; controls.update(); renderer.render(scene, camera); requestAnimationFrame(animate); } animate();
      }

      function rebuildSpatialRuntime() {
        if (!spatialRuntime?.scene) return;
        spatialRuntime.nodeMeshes.forEach((mesh) => { spatialRuntime.scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); });
        spatialRuntime.nodeMeshes.clear();
        Array.from(spatialRuntime.scene.children).filter((obj) => obj.type === 'Line').forEach((obj) => spatialRuntime.scene.remove(obj));
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x404050, transparent: true, opacity: 0.6 });
        payload.spatial.nodes.forEach((node) => {
          const mesh = new THREE.Mesh(createGeometry(node.shape), new THREE.MeshStandardMaterial({ color: node.style?.color ?? '#a1a1aa', emissive: node.style?.emissive ?? '#000000', emissiveIntensity: 0.12, roughness: 0.45, metalness: 0.2, transparent: true, opacity: node.style?.opacity ?? 1 }));
          mesh.position.set(node.position.x, node.position.y, node.position.z); mesh.rotation.set(node.rotation.x, node.rotation.y, node.rotation.z); mesh.scale.set(node.scale.x, node.scale.y, node.scale.z); mesh.userData = { nodeId: node.id, baseColor: node.style?.color ?? '#a1a1aa', baseScale: { ...node.scale } };
          spatialRuntime.scene.add(mesh); spatialRuntime.nodeMeshes.set(node.id, mesh);
        });
        payload.spatial.edges.forEach((edge) => { const from = spatialRuntime.nodeMeshes.get(edge.from); const to = spatialRuntime.nodeMeshes.get(edge.to); if (!from || !to) return; spatialRuntime.scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([from.position, to.position]), lineMaterial)); });
        updateSpatialSelection();
      }

      function updateSpatialSelection() {
        if (!spatialRuntime?.nodeMeshes) return;
        const selected = selectedNode(); const related = relatedIds();
        spatialRuntime.nodeMeshes.forEach((mesh, id) => {
          const material = mesh.material; const baseColor = mesh.userData.baseColor; const baseScale = mesh.userData.baseScale ?? { x: 1, y: 1, z: 1 };
          material.color.set(baseColor); material.emissive.set(baseColor); material.emissiveIntensity = 0.12; mesh.scale.set(baseScale.x, baseScale.y, baseScale.z);
          if (selected && id === selected.id) { material.emissiveIntensity = 0.65; mesh.scale.set(baseScale.x * 1.35, baseScale.y * 1.35, baseScale.z * 1.35); }
          else if (related.has(id)) { material.emissiveIntensity = 0.28; mesh.scale.set(baseScale.x * 1.15, baseScale.y * 1.15, baseScale.z * 1.15); }
        });
      }

      function renderSpatialPanel() {
        tabContentEl.innerHTML = '<div class="spatial-wrap"><section class="panel"><h3>Spatial / 3D Projection v0</h3><canvas id="spatial-canvas" class="spatial-canvas"></canvas></section><section class="panel"><h3>Spatial Legend</h3><div class="spatial-legend"><div class="legend-item"><span class="legend-dot" style="background:#ec4899"></span>Visual plane</div><div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span>Data plane</div><div class="legend-item"><span class="legend-dot" style="background:#8b5cf6"></span>Behavior plane</div><div class="legend-item"><span class="legend-dot" style="background:#a1a1aa"></span>Structure / other</div></div><p class="subtle" style="margin-top:16px">Spatial usando <code>.3djson</code>. Clique numa forma para selecionar o node.</p></section></div>';
        ensureSpatialRuntime(); spatialRuntime?.updateSize?.();
      }

      function renderFilesPanel() {
        const selectedPath = state.selectedFilePath ?? payload.files[0]?.path;
        const selected = payload.files.find((file) => file.path === selectedPath) ?? payload.files[0];
        const current = selectedNode(); const candidateNames = current ? [current.id, current.name] : [];
        const links = payload.files.map((file) => '<button class="file-link ' + (file.path === selected?.path ? 'active' : '') + '" data-file-path="' + file.path + '">' + file.path + '</button>').join('');
        const code = selected ? escapeUnsafe(selected.content).split('\n').map((line) => '<div class="projection-line ' + (candidateNames.some((name) => line.includes(name)) ? 'selected' : '') + '">' + line + '</div>').join('') : 'No files generated.';
        tabContentEl.innerHTML = '<section class="panel"><h3>Generated Files</h3>' + links + '</section><section class="panel"><h3>' + escapeUnsafe(selected?.path ?? 'No file') + '</h3><pre>' + code + '</pre></section>';
        tabContentEl.querySelectorAll('[data-file-path]').forEach((el) => el.addEventListener('click', () => { state.selectedFilePath = el.getAttribute('data-file-path'); renderTabContent(); }));
      }

      function renderTabContent() {
        if (state.activeTab === 'visual') return renderVisualPanel();
        if (state.activeTab === 'spatial') return renderSpatialPanel();
        if (state.activeTab === 'structure') { tabContentEl.innerHTML = renderProjectionPanel('Structure Projection', payload.structure); return; }
        if (state.activeTab === 'data') { tabContentEl.innerHTML = renderProjectionPanel('Data Projection', payload.data); return; }
        if (state.activeTab === 'behavior') { tabContentEl.innerHTML = renderProjectionPanel('Behavior Projection', payload.behavior); return; }
        renderFilesPanel();
      }

      function applyEdits() {
        const node = selectedNode(); if (!node) return;
        const nameInput = document.getElementById('edit-name');
        const propsInput = document.getElementById('edit-props');
        try {
          node.name = nameInput.value.trim() || node.name;
          const parsed = propsInput.value.trim() ? JSON.parse(propsInput.value) : {};
          node.props = parsed;
          recomputeDerived();
          state.editStatus = 'Applied edits in memory 🌸';
          renderNodeList(); renderTabContent(); renderInspector(); rebuildSpatialRuntime();
        } catch (error) {
          state.editStatus = 'Invalid props JSON 😵';
          renderInspector();
        }
      }

      function resetEdits() {
        const currentId = state.selectedNodeId;
        const fresh = structuredClone(initialPayload);
        Object.keys(payload).forEach((key) => delete payload[key]);
        Object.assign(payload, fresh);
        state.selectedNodeId = currentId;
        recomputeDerived();
        state.editStatus = 'Reset to original preview.';
        renderNodeList(); renderTabContent(); renderInspector(); rebuildSpatialRuntime();
      }

      function renderInspector() {
        const node = selectedNode(); if (!node) { inspectorEl.innerHTML = '<section class="panel"><p class="subtle">No node selected.</p></section>'; return; }
        const tags = (node.tags ?? []).map((tag) => '<span class="badge">' + tag + '</span>').join('');
        const dimensionFlags = ['visual','data','behavior'].map((dimension) => '<span class="pill ' + (nodeDimension(node) === dimension ? 'on' : '') + '">' + dimension + '</span>').join('');
        const focus = focusNodes().map((relatedNode) => '<button class="focus-item ' + (isRelated(relatedNode.id) ? 'related' : '') + '" data-focus-node-id="' + relatedNode.id + '"><div class="node-kind">' + relatedNode.kind + '</div><div>' + relatedNode.name + '</div><div class="subtle">' + relatedNode.id + '</div></button>').join('') || '<div class="empty">No nodes in this focus.</div>';
        const related = (node.relatedNodeIds ?? []).map((id) => { const relatedNode = nodeById(id); if (!relatedNode) return ''; return '<button class="related-item" data-related-node-id="' + relatedNode.id + '"><div class="node-kind">' + relatedNode.kind + '</div><div>' + relatedNode.name + '</div><div class="subtle">' + relatedNode.id + '</div></button>'; }).join('') || '<div class="empty">No linked nodes.</div>';
        inspectorEl.innerHTML = '<section class="panel"><h3>' + escapeUnsafe(node.name) + '</h3><div class="kv"><div>ID</div><div>' + escapeUnsafe(node.id) + '</div><div>Kind</div><div>' + escapeUnsafe(node.kind) + '</div><div>Tags</div><div>' + (tags || '<span class="subtle">none</span>') + '</div></div></section>' +
          '<section class="panel"><h3>Dimension</h3><div class="pill-row">' + dimensionFlags + '</div></section>' +
          '<section class="panel"><h3>Editing v0</h3><div class="stack"><div><div class="subtle">Node name</div><input id="edit-name" value="' + escapeUnsafe(node.name) + '" /></div><div><div class="subtle">Props JSON</div><textarea id="edit-props">' + escapeUnsafe(pretty(node.props ?? {})) + '</textarea></div><div class="row"><button class="action-btn" id="apply-edits">Apply</button><button class="action-btn" id="reset-edits">Reset preview</button></div><div class="status">' + escapeUnsafe(state.editStatus || 'Edit name or props and apply.') + '</div></div></section>' +
          '<section class="panel"><h3>Focus by Dimension</h3><div class="subtabs">' + ['all','visual','data','behavior'].map((mode) => '<button class="subtab ' + (state.focusMode === mode ? 'active' : '') + '" data-focus-mode="' + mode + '">' + mode + '</button>').join('') + '</div><div class="focus-list">' + focus + '</div></section>' +
          '<section class="panel"><h3>Linked Nodes</h3><div class="related-list">' + related + '</div></section>' +
          '<section class="panel"><h3>Node JSON</h3><pre>' + escapeUnsafe(pretty(node)) + '</pre></section>';
        inspectorEl.querySelectorAll('[data-related-node-id]').forEach((el) => el.addEventListener('click', () => selectNode(el.getAttribute('data-related-node-id'))));
        inspectorEl.querySelectorAll('[data-focus-node-id]').forEach((el) => el.addEventListener('click', () => selectNode(el.getAttribute('data-focus-node-id'))));
        inspectorEl.querySelectorAll('[data-focus-mode]').forEach((el) => el.addEventListener('click', () => { state.focusMode = el.getAttribute('data-focus-mode'); renderInspector(); }));
        document.getElementById('apply-edits')?.addEventListener('click', applyEdits);
        document.getElementById('reset-edits')?.addEventListener('click', resetEdits);
      }

      recomputeDerived(); updateAppMeta(); renderNodeList(); renderTabs(); renderTabContent(); renderInspector();
    </script>
  </body>
</html>
